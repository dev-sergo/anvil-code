<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="anvil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1e293b"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)" opacity="0.6"/>

  <!-- Left glow from accent color -->
  <rect x="0" y="0" width="500" height="640" fill="url(#glow)" opacity="0.5"/>

  <!-- Top border line (orange) -->
  <rect x="0" y="0" width="1280" height="4" fill="#f97316"/>

  <!-- ── Large Anvil (left center) ── -->
  <g transform="translate(160, 200) scale(1.9)">
    <!-- Top table -->
    <rect x="30" y="64" width="140" height="18" rx="5" fill="url(#anvil)"/>
    <!-- Horn -->
    <polygon points="50,86 14,101 50,116" fill="url(#anvil)"/>
    <!-- Body -->
    <polygon points="55,82 145,82 145,130 55,130" fill="url(#anvil)"/>
    <!-- Base -->
    <rect x="26" y="128" width="148" height="18" rx="5" fill="url(#anvil)"/>
    <!-- seam -->
    <line x1="55" y1="82" x2="145" y2="82" stroke="#0f172a" stroke-width="1" opacity="0.4"/>
    <!-- /> accent -->
    <line x1="88" y1="120" x2="98" y2="96"  stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
    <polyline points="104,95 116,103 104,111" stroke="#f97316" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Vertical divider -->
  <line x1="560" y1="100" x2="560" y2="540" stroke="#1e293b" stroke-width="2"/>

  <!-- ── Right text block ── -->
  <!-- Project name -->
  <text x="620" y="230"
        font-family="ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace"
        font-size="80" font-weight="800" fill="#f1f5f9" letter-spacing="-2">
    Anvil-Code
  </text>

  <!-- Orange accent bar -->
  <rect x="620" y="248" width="460" height="5" rx="2.5" fill="#f97316"/>

  <!-- Tagline -->
  <text x="620" y="310"
        font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="28" fill="#94a3b8" letter-spacing="0.3">
    Autonomous coding agent for TypeScript
  </text>
  <text x="620" y="348"
        font-family="ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="28" fill="#64748b" letter-spacing="0.3">
    100% local · 32B models · No cloud
  </text>

  <!-- Stats row -->
  <!-- Sandbox stat -->
  <rect x="620" y="400" width="210" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="640" y="424"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="13" fill="#64748b">sandbox</text>
  <text x="640" y="450"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="24" font-weight="700" fill="#22c55e">87.5%</text>

  <!-- Real repo stat -->
  <rect x="848" y="400" width="210" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="868" y="424"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="13" fill="#64748b">real repos</text>
  <text x="868" y="450"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="24" font-weight="700" fill="#f97316">38%</text>

  <!-- Tests stat -->
  <rect x="1076" y="400" width="170" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1096" y="424"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="13" fill="#64748b">unit tests</text>
  <text x="1096" y="450"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="24" font-weight="700" fill="#3b82f6">534</text>

  <!-- Tags row -->
  <text x="620" y="510"
        font-family="ui-monospace,SFMono-Regular,Consolas,monospace"
        font-size="16" fill="#475569" letter-spacing="1.5">
    #typescript  #llm  #local-ai  #rag  #multi-agent
  </text>

  <!-- Bottom border -->
  <rect x="0" y="636" width="1280" height="4" fill="#1e293b"/>
</svg>
